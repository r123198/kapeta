<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coffeeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#6B3E2E;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#F5F5DC;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#F5F5DC;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#coffeeGradient)"/>
  
  <!-- Spotlight effect -->
  <ellipse cx="960" cy="324" rx="800" ry="400" fill="url(#spotlight)"/>
  
  <!-- Coffee cup patterns -->
  <g opacity="0.1">
    <circle cx="200" cy="200" r="60" fill="#F5F5DC"/>
    <circle cx="1720" cy="300" r="80" fill="#F5F5DC"/>
    <circle cx="400" cy="800" r="70" fill="#F5F5DC"/>
    <circle cx="1600" cy="700" r="50" fill="#F5F5DC"/>
  </g>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#F5F5DC" stroke-width="1">
    <line x1="0" y1="0" x2="1920" y2="0"/>
    <line x1="0" y1="108" x2="1920" y2="108"/>
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="324" x2="1920" y2="324"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="756" x2="1920" y2="756"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="0" y1="972" x2="1920" y2="972"/>
    <line x1="0" y1="1080" x2="1920" y2="1080"/>
  </g>
</svg> 